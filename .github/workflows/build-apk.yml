name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Web App
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: npm run build

      - name: Generate Android Icons from Logo
        run: |
          # Remove default adaptive icons so Android uses our generated PNGs
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          rm -f android/app/src/main/res/drawable-v24/ic_launcher_foreground.xml
          
          pip install cairosvg Pillow --quiet
          python3 - <<'EOF'
          import cairosvg
          from PIL import Image
          import io, os

          svg_path = "public/logo.svg"
          sizes = {
            "mipmap-mdpi": 48,
            "mipmap-hdpi": 72,
            "mipmap-xhdpi": 96,
            "mipmap-xxhdpi": 144,
            "mipmap-xxxhdpi": 192,
          }
          base = "android/app/src/main/res"
          for folder, size in sizes.items():
            png_data = cairosvg.svg2png(url=svg_path, output_width=size, output_height=size)
            img = Image.open(io.BytesIO(png_data)).convert("RGBA")
            out_dir = os.path.join(base, folder)
            os.makedirs(out_dir, exist_ok=True)
            img.save(os.path.join(out_dir, "ic_launcher.png"))
            img.save(os.path.join(out_dir, "ic_launcher_round.png"))
            print(f"  ✅ {folder}: {size}x{size}")
          print("Icons generated!")
          EOF

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore (Safe Method)
        shell: python
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          import base64
          import os
          keystore_b64 = os.environ['KEYSTORE_BASE64'].strip()
          with open('android/app/release.keystore', 'wb') as f:
              f.write(base64.b64decode(keystore_b64))

      - name: Patch Legacy Plugins (jcenter fix)
        run: |
          # Patch all build.gradle and settings.gradle files
          find . -name "*.gradle" -type f -exec sed -i 's/jcenter\s*( *)/mavenCentral()/g' {} +
          find . -name "*.gradle" -type f -exec sed -i 's/maven\s*{\s*url\s*["\x27]https:\/\/jcenter.bintray.com["\x27]\s*}/mavenCentral()/g' {} +
          
          # Fix namespace for AGP 8+ in plugins if missing
          # This is a bit complex but helps with legacy plugins
          for f in $(find node_modules -name "build.gradle"); do
            if ! grep -q "namespace" "$f"; then
              # Try to extract package name from AndroidManifest.xml
              manifest=$(dirname "$f")/src/main/AndroidManifest.xml
              if [ -f "$manifest" ]; then
                pkg=$(grep -oP 'package="\K[^"]+' "$manifest")
                if [ -n "$pkg" ]; then
                  sed -i "/android {/a \    namespace \"$pkg\"" "$f"
                fi
              fi
            fi
          done

      - name: Generate Gradle Wrapper
        working-directory: ./android
        run: gradle wrapper --gradle-version 8.5

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info \
            -PRELEASE_STORE_FILE=release.keystore \
            -PRELEASE_STORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: EXTRAINDO SHA-1 PARA O FIREBASE
        run: |
          echo "COPIE E COLE O SEGUINTE CÓDIGO NO SEU FIREBASE CONSOLE:"
          keytool -list -v -keystore android/app/release.keystore -alias "${{ secrets.ANDROID_KEY_ALIAS }}" -storepass "${{ secrets.ANDROID_KEY_PASSWORD }}" -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" | grep "SHA1:"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
