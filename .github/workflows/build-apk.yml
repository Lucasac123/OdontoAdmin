name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Web App
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: npm run build

      - name: Generate Android Icons from Logo
        run: |
          # Remove default adaptive icons so Android uses our generated PNGs
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          rm -f android/app/src/main/res/drawable-v24/ic_launcher_foreground.xml
          
          # Install dependencies for cairosvg on Ubuntu
          sudo apt-get update && sudo apt-get install -y libcairo2-dev libffi-dev libxml2-dev libxslt-dev
          pip install cairosvg Pillow --quiet
          
          python3 - <<'EOF'
          import cairosvg
          from PIL import Image
          import io, os
          import sys

          svg_path = "public/logo.svg"
          if not os.path.exists(svg_path):
              print(f"⚠️ Error: {svg_path} not found! Skipping icon generation.")
              sys.exit(0)

          sizes = {
            "mipmap-mdpi": 48,
            "mipmap-hdpi": 72,
            "mipmap-xhdpi": 96,
            "mipmap-xxhdpi": 144,
            "mipmap-xxxhdpi": 192,
          }
          base = "android/app/src/main/res"
          for folder, size in sizes.items():
            try:
                png_data = cairosvg.svg2png(url=svg_path, output_width=size, output_height=size)
                img = Image.open(io.BytesIO(png_data)).convert("RGBA")
                out_dir = os.path.join(base, folder)
                os.makedirs(out_dir, exist_ok=True)
                img.save(os.path.join(out_dir, "ic_launcher.png"))
                img.save(os.path.join(out_dir, "ic_launcher_round.png"))
                print(f"  ✅ {folder}: {size}x{size}")
            except Exception as e:
                print(f"  ❌ Error generating {folder}: {e}")
          EOF

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5
          cache-disabled: false

      - name: Decode Keystore
        shell: python
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          import base64
          import os
          keystore_b64 = os.environ['KEYSTORE_BASE64'].strip()
          os.makedirs('android/app', exist_ok=True)
          with open('android/app/release.keystore', 'wb') as f:
              f.write(base64.b64decode(keystore_b64))

      - name: Patch Plugins (Legacy Fix)
        run: |
          find . -name "*.gradle" -type f -exec sed -i 's/jcenter\s*( *)/mavenCentral()/g' {} +
          find . -name "*.gradle" -type f -exec sed -i 's/maven\s*{\s*url\s*["\x27]https:\/\/jcenter.bintray.com["\x27]\s*}/mavenCentral()/g' {} +
          
          # Fix namespace for AGP 8+ in plugins
          for f in $(find node_modules -name "build.gradle"); do
            if ! grep -q "namespace" "$f"; then
              manifest=$(dirname "$f")/src/main/AndroidManifest.xml
              if [ -f "$manifest" ]; then
                pkg=$(grep -oP 'package="\K[^"]+' "$manifest" || echo "")
                if [ -n "$pkg" ]; then
                  sed -i "/android {/a \    namespace \"$pkg\"" "$f"
                fi
              fi
            fi
          done

      - name: Build APK
        working-directory: ./android
        run: |
          ./gradlew assembleDebug --stacktrace --info \
            -PRELEASE_STORE_FILE=release.keystore \
            -PRELEASE_STORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Extraction SHA-1 for Firebase
        run: |
          keytool -list -v -keystore android/app/release.keystore -alias "${{ secrets.ANDROID_KEY_ALIAS }}" -storepass "${{ secrets.ANDROID_KEY_PASSWORD }}" -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" | grep "SHA1:" || echo "SHA1 not found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
