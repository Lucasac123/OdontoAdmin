<svg xmlns="http://www.sums.com" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="112" fill="#ffffff" />
  
  <g transform="translate(100, 100) scale(1.2)" filter="url(#glow)">
    <!-- Crown -->
    <path d="M50 80 C 30 150, 40 180, 80 180 C 110 180, 130 140, 130 140 C 130 140, 150 180, 180 180 C 220 180, 230 150, 210 80 C 200 40, 160 50, 130 80 C 100 50, 60 40, 50 80 Z" fill="url(#grad)" />
    <!-- Roots -->
    <path d="M80 170 C 60 250, 60 280, 90 290 C 110 290, 110 250, 120 200" fill="none" stroke="url(#grad)" stroke-width="24" stroke-linecap="round" />
    <path d="M180 170 C 200 250, 200 280, 170 290 C 150 290, 150 250, 140 200" fill="none" stroke="url(#grad)" stroke-width="24" stroke-linecap="round" />
  </g>
</svg>
